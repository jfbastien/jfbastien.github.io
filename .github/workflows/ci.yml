name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: sudo apt-get install -y pngquant
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: screenshot.png
